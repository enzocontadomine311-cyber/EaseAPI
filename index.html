<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseAPI - Verificar Conta</title>
    <style>
        body {
            background-color: #23272a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background-color: #2c2f33;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid #5865F2;
            margin-bottom: 20px;
            background-color: #23272a;
        }
        h2 {
            margin: 10px 0;
            font-size: 24px;
        }
        p {
            color: #b9bbbe;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .btn-discord {
            background-color: #5865F2;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
            display: inline-block;
        }
        .btn-discord:hover {
            background-color: #4752C4;
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- Foto do usuário (padrão temporária) -->
        <img id="avatar" class="avatar" src="https://discord.com/assets/c09a43a372ba81e1957e3138bde781d4.png" alt="Avatar">
        
        <h2 id="username">Olá, Visitante!</h2>
        <p id="status-text">Para receber seu cargo automaticamente no servidor, clique no botão abaixo para se verificar.</p>
        
        <a href="/login" id="login-btn" class="btn-discord">Logar com o Discord</a>
    </div>

    <script>
        // Script simples para detectar se o usuário já logou e mudar o texto/foto
        const urlParams = new URLSearchParams(window.location.search);
        const username = urlParams.get('username');
        const avatar = urlParams.get('avatar');
        const success = urlParams.get('success');

        if (username) {
            document.getElementById('username').innerText = `Olá, ${username}!`;
            document.getElementById('login-btn').style.display = 'none';
            if (avatar) document.getElementById('avatar').src = avatar;
            
            if (success === 'true') {
                document.getElementById('status-text').innerHTML = "<span style='color: #43b581; font-weight: bold;'>Cargo recebido com sucesso! Você já pode fechar esta página.</span>";
            }
        }
    </script>
</body>
</html>
